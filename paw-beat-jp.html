let meowPawBuffer = null;
let meowScratchBuffer = null;

let meowLoading = false;
function b64ToArrayBuffer(b64) {
  const bin = atob(b64);
  const len = bin.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer.slice(0);
}
async function loadMeow() {
  if (!ac || meowLoading) return;
  meowLoading = true;
  try {
    const pawBuf = b64ToArrayBuffer(MEOW_PAW_B64);
    console.log('Decoding paw...', pawBuf.byteLength, 'bytes');
    meowPawBuffer = await ac.decodeAudioData(pawBuf);
    console.log('Paw meow loaded, duration:', meowPawBuffer.duration);
  } catch(e) { console.warn('Paw meow decode FAILED:', e); }
  try {
    const scrBuf = b64ToArrayBuffer(MEOW_SCRATCH_B64);
    console.log('Decoding scratch...', scrBuf.byteLength, 'bytes');
    meowScratchBuffer = await ac.decodeAudioData(scrBuf);
    console.log('Scratch meow loaded, duration:', meowScratchBuffer.duration);
  } catch(e) { console.warn('Scratch meow decode FAILED:', e); }
}

function playMeow(buffer, rate = 1.0) {
  if (!ac) return;
  if (!buffer) {
    // Fallback while loading - still make a cat-like sound
    playTone(800, 0.15, 'sine', 0.35);
    playTone(600, 0.1, 'triangle', 0.2);
    console.log('Meow fallback (buffer not ready)');
    return;
  }
  const src = ac.createBufferSource();
  const g = ac.createGain();
  src.buffer = buffer;
  src.playbackRate.value = rate;
  g.gain.value = 0.7;
  src.connect(g); g.connect(ac.destination);
  src.start();
  src.onended = () => { src.disconnect(); g.disconnect(); };
}

let ac = null;
function ensureAudio() {
  if (!ac) {
    ac = new (window.AudioContext || window.webkitAudioContext)();
    loadMeow();
  }
  if (ac.state === 'suspended') ac.resume();
}

function playTone(freq, dur, type = 'sine', vol = 0.3) {
  if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + dur);
  o.onended = () => { o.disconnect(); g.disconnect(); };
}

function noise(dur, vol) {
  if (!ac) return;
  const n = ac.sampleRate * dur;
  const buf = ac.createBuffer(1, n, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
  const s = ac.createBufferSource(), g = ac.createGain();
  s.buffer = buf; g.gain.value = vol;
  s.connect(g); g.connect(ac.destination); s.start();
  s.onended = () => { s.disconnect(); g.disconnect(); };
}

function playDon() {
  const rate = 0.95 + Math.random() * 0.15;
  playMeow(meowPawBuffer, rate);
}

function playKa() {
  const rate = 1.0 + Math.random() * 0.2;
  playMeow(meowScratchBuffer, rate);
}

function playPerfect() {
  playTone(880, 0.12, 'sine', 0.25);
  playTone(1108, 0.1, 'sine', 0.18);
  playTone(1320, 0.08, 'sine', 0.12);
}
function playGood() { playTone(660, 0.12, 'sine', 0.18); playTone(830, 0.08, 'sine', 0.1); }
function playSelect() { playTone(1200, 0.06, 'sine', 0.15); playTone(1500, 0.04, 'sine', 0.08); }
function playMiss() { noise(0.1, 0.3); playTone(120, 0.15, 'sine', 0.2); }
function playComboMilestone(combo) {
  // Ascending chime for combo milestones
  const base = 523;
  playTone(base, 0.1, 'sine', 0.2);
  setTimeout(() => playTone(base * 1.25, 0.1, 'sine', 0.2), 60);
  setTimeout(() => playTone(base * 1.5, 0.15, 'sine', 0.25), 120);
  if (combo >= 50) setTimeout(() => playTone(base * 2, 0.2, 'sine', 0.3), 180);
}
function playFanfare() {
  playTone(523, 0.15, 'sine', 0.3); playTone(523*1.25, 0.1, 'sine', 0.15);
  setTimeout(() => { playTone(659, 0.15, 'sine', 0.3); playTone(659*1.25, 0.1, 'sine', 0.15); }, 140);
  setTimeout(() => { playTone(784, 0.15, 'sine', 0.3); playTone(784*1.25, 0.1, 'sine', 0.15); }, 280);
  setTimeout(() => { playTone(1047, 0.4, 'sine', 0.35); playTone(1319, 0.3, 'sine', 0.2); playTone(1568, 0.25, 'sine', 0.15); }, 420);
}

// ---- Compute timed events from sequential [freq, dur] arrays ----
function computeEvents(noteArray, bpm, startOffset) {
  const eighthDur = 60 / bpm / 2;
  const events = [];
  let t = startOffset;
  for (const [freq, dur] of noteArray) {
    if (freq > 0) events.push({ time: t, freq, dur: dur * eighthDur * 0.85 });
    t += dur * eighthDur;
  }
  return { events, totalDur: t - startOffset };
}

// ---- BGM System (driven from game loop) ----
let bgmPlaying = false;
let melodyEvents = [], bassEvents = [];
let melodyIdx = 0, bassIdx = 0;

let bgmSongIdx = 0;
function stopBGM() { bgmPlaying = false; melodyIdx = 0; bassIdx = 0; percIdx = 0; chordIdx = 0; melodyEvents = []; bassEvents = []; percEvents = []; chordEvents = []; }

function startBGM(songIdx, bpm) {
  stopBGM();
  const startOffset = 2; // match beat map offset
  // Compute melody events and loop to fill ~42 seconds
  const mel = computeEvents(MELODIES[songIdx], bpm, 0);
  const bas = computeEvents(BASS[songIdx], bpm, 0);
  melodyEvents = []; bassEvents = [];
  const fillDur = 42;
  for (let offset = startOffset; offset < fillDur; offset += mel.totalDur) {
    for (const e of mel.events) {
      if (e.time + offset < fillDur) melodyEvents.push({ time: e.time + offset, freq: e.freq, dur: e.dur });
    }
  }
  for (let offset = startOffset; offset < fillDur; offset += bas.totalDur) {
    for (const e of bas.events) {
      if (e.time + offset < fillDur) bassEvents.push({ time: e.time + offset, freq: e.freq, dur: e.dur });
    }
  }
  buildPercEvents(bpm, startOffset, fillDur);
  bgmSongIdx = songIdx;
  melodyIdx = 0; bassIdx = 0; percIdx = 0; chordIdx = 0;
  bgmPlaying = true;
}

// Percussion + chord events
let percIdx = 0, percEvents = [];
let chordIdx = 0, chordEvents = [];

// Chord progressions per song (root freqs, each lasts 4 beats = 8 eighths)
const CHORD_ROOTS = [
  [220, 164.8, 220, 174.6, 220, 164.8, 220, 164.8],   // さくら: Am
  [130.8, 174.6, 196, 130.8, 220, 174.6, 196, 130.8],  // ふるさと: C
  [130.8, 174.6, 220, 196, 130.8, 220, 196, 130.8],  // 赤とんぼ: C
  [220, 220, 164.8, 220, 164.8, 220, 164.8, 220],         // 荒城の月: Am
];

function buildPercEvents(bpm, startOffset, fillDur) {
  percEvents = [];
  chordEvents = [];
  const eighth = 60 / bpm / 2;
  const quarter = 60 / bpm;
  for (let t = startOffset; t < fillDur; t += eighth) {
    const beat = Math.round((t - startOffset) / eighth);
    percEvents.push({ time: t, beat });
  }
  // Chord stabs every half note (4 eighths)
  for (let t = startOffset; t < fillDur; t += quarter * 2) {
    const idx = Math.floor((t - startOffset) / (quarter * 2));
    chordEvents.push({ time: t, idx });
  }
}

function tickBGM(elapsed) {
  if (!bgmPlaying || !ac) return;
  // Melody — louder, richer, with harmony
  while (melodyIdx < melodyEvents.length && melodyEvents[melodyIdx].time <= elapsed) {
    const e = melodyEvents[melodyIdx];
    playTone(e.freq, e.dur, 'sine', 0.3);            // main voice
    playTone(e.freq * 2, e.dur * 0.6, 'sine', 0.08); // octave shimmer
    playTone(e.freq * 1.5, e.dur * 0.4, 'sine', 0.04); // fifth harmony
    melodyIdx++;
  }
  // Bass — groovy and driving
  while (bassIdx < bassEvents.length && bassEvents[bassIdx].time <= elapsed) {
    const e = bassEvents[bassIdx];
    playTone(e.freq, e.dur * 0.7, 'triangle', 0.22);      // punchy staccato bass
    playTone(e.freq * 2, e.dur * 0.4, 'triangle', 0.08);  // octave up
    playTone(e.freq * 0.5, e.dur * 0.5, 'sine', 0.12);    // deep sub
    bassIdx++;
  }
  // Chord stabs — funky offbeat comping
  const songRoots = CHORD_ROOTS[bgmSongIdx] || CHORD_ROOTS[0];
  while (chordIdx < chordEvents.length && chordEvents[chordIdx].time <= elapsed) {
    const c = chordEvents[chordIdx];
    const root = songRoots[c.idx % songRoots.length];
    // Bright staccato triad
    playTone(root * 2, 0.08, 'sine', 0.08);
    playTone(root * 2.5, 0.08, 'sine', 0.06);
    playTone(root * 3, 0.06, 'sine', 0.05);
    playTone(root * 4, 0.04, 'sine', 0.03); // sparkle top
    chordIdx++;
  }
  // Percussion — ノリノリ full band groove
  while (percIdx < percEvents.length && percEvents[percIdx].time <= elapsed) {
    const p = percEvents[percIdx];
    const b = p.beat; // eighth note count
    const bar = b % 16; // position in 2-bar phrase

    // === KICK (ドンッ) — 1拍目&3拍目 + syncopation ===
    if (bar === 0 || bar === 4 || bar === 8 || bar === 12) {
      playTone(48, 0.12, 'sine', 0.45);  // deep kick
      playTone(95, 0.05, 'sine', 0.25);  // attack
      noise(0.015, 0.15);                 // transient
    }
    // Syncopated ghost kick
    if (bar === 3 || bar === 11) {
      playTone(55, 0.06, 'sine', 0.18);
    }

    // === SNARE (パシッ) — 2拍目&4拍目 (backbeat) ===
    if (bar === 4 || bar === 12) {
      noise(0.06, 0.35);
      playTone(180, 0.04, 'triangle', 0.2);
      playTone(300, 0.02, 'sine', 0.08);
    }

    // === HI-HAT — every eighth, accented pattern ===
    if (b % 2 === 0) {
      // Downbeat hat — louder
      noise(0.02, 0.14);
      playTone(9000, 0.008, 'square', 0.04);
    } else {
      // Upbeat hat — softer, gives swing feel
      noise(0.012, 0.09);
    }

    // === OPEN HAT — on the "and" of 2 and 4 ===
    if (bar === 5 || bar === 13) {
      noise(0.05, 0.2);
      playTone(7000, 0.015, 'square', 0.05);
    }

    // === CLAP on 2 and 4 — adds pop feel ===
    if (bar === 4 || bar === 12) {
      noise(0.03, 0.22);
      setTimeout(() => noise(0.025, 0.12), 15); // flamm effect
    }

    // === Bar 1 accent — crash-like ===
    if (bar === 0 && b > 0) {
      noise(0.08, 0.12);
      playTone(5000, 0.02, 'sine', 0.04);
    }

    percIdx++;
  }
}

// Generate beat maps from melody data
function generateBeatMap(songIdx) {
  const bpm = songs[songIdx].bpm;
  const eighthDur = 60 / bpm / 2;
  const startOffset = 2;
  const melody = MELODIES[songIdx];
  const notes = [];
  const fillDur = 42;

  // Compute one pass of melody
  const mel = computeEvents(melody, bpm, 0);

  // Loop melody and create beat map
  // Alternate don/ka by note index (every 2-3 notes switch)
  for (let offset = startOffset; offset < fillDur; offset += mel.totalDur) {
    let t = 0;
    let noteIdx = 0;
    for (const [freq, dur] of melody) {
      if (freq > 0 && t + offset < fillDur) {
        // Pattern: don don ka don don ka don ka don don ka ...
        // Gives roughly 60% don, 40% ka — feels natural
        const patLen = 5;
        const pat = noteIdx % patLen;
        const type = (pat === 2 || pat === 4) ? 'ka' : 'don';
        notes.push({ time: t + offset, type });
        noteIdx++;
      }
      t += dur * eighthDur;
    }
  }
  return notes;
}

// ---- Effects ----
let effects = [];
function addEffect(x, y, text, color, size) {
  effects.push({ x, y, text, color, size, alpha: 1, t: 0, vy: -1.5 });
}
function addBurst(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = (Math.PI * 2 / count) * i;
    const spd = 2 + Math.random() * 4;
    effects.push({ x, y, text: null, color, size: 3 + Math.random() * 5, alpha: 1, t: 0, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, particle: true });
  }
}
function updateEffects(dt) {
  for (let i = effects.length - 1; i >= 0; i--) {
    const e = effects[i];
    e.t += dt; e.alpha = Math.max(0, 1 - e.t / 0.6);
    if (e.particle) { e.x += e.vx; e.y += e.vy; e.vy += 0.2; e.size *= 0.96; }
    else e.y += e.vy;
    if (e.alpha <= 0) effects.splice(i, 1);
  }
}
function drawEffects() {
  for (const e of effects) {
    ctx.globalAlpha = e.alpha;
    if (e.particle) {
      ctx.fillStyle = e.color;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI*2); ctx.fill();
    } else if (e.text) {
      ctx.fillStyle = e.color;
      ctx.font = `700 ${e.size}px Fredoka,sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(e.text, e.x, e.y);
    }
    ctx.globalAlpha = 1;
  }
}

// ---- Responsive font size (with minimum floor) ----
function fs(max, frac, min = 12) { return Math.max(min, Math.min(max, W * frac)); }

// ---- Paw Print Drawing ----
function drawPawPrint(x, y, size, color) {
  ctx.save();
  ctx.fillStyle = color;
  // Main pad (big bean)
  ctx.beginPath();
  ctx.ellipse(x, y + size * 0.15, size * 0.38, size * 0.32, 0, 0, Math.PI * 2);
  ctx.fill();
  // Toe beans (4 small circles on top)
  const toeR = size * 0.17;
  const toeY = y - size * 0.22;
  const toeSpread = size * 0.28;
  const toeOuter = size * 0.42;
  ctx.beginPath(); ctx.arc(x - toeOuter, toeY + size*0.05, toeR, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x - toeSpread * 0.5, toeY - size*0.08, toeR, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + toeSpread * 0.5, toeY - size*0.08, toeR, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + toeOuter, toeY + size*0.05, toeR, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// Scratch mark (3 diagonal lines) for blue notes
function drawScratchMark(x, y, size, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = size * 0.12;
  ctx.lineCap = 'round';
  for (let i = -1; i <= 1; i++) {
    const ox = i * size * 0.25;
    ctx.beginPath();
    ctx.moveTo(x + ox - size*0.15, y - size*0.3);
    ctx.lineTo(x + ox + size*0.15, y + size*0.3);
    ctx.stroke();
  }
  ctx.restore();
}

// ---- Rin-chan (small mascot) ----
function drawRinChan(x, y, s, expr) {
  ctx.save();
  // Simplified cat
  ctx.fillStyle = '#FFE4B5';
  // Head
  ctx.beginPath(); ctx.arc(x, y, s*0.4, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#D4A574'; ctx.lineWidth = 1.5; ctx.stroke();
  // Ears
  ctx.fillStyle = '#FFE4B5';
  ctx.beginPath(); ctx.moveTo(x-s*0.3, y-s*0.55); ctx.lineTo(x-s*0.12, y-s*0.2); ctx.lineTo(x-s*0.4, y-s*0.25); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+s*0.3, y-s*0.55); ctx.lineTo(x+s*0.12, y-s*0.2); ctx.lineTo(x+s*0.4, y-s*0.25); ctx.closePath(); ctx.fill(); ctx.stroke();
  // Inner ears
  ctx.fillStyle = '#FFB6C1';
  ctx.beginPath(); ctx.moveTo(x-s*0.26, y-s*0.48); ctx.lineTo(x-s*0.15, y-s*0.23); ctx.lineTo(x-s*0.36, y-s*0.27); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+s*0.26, y-s*0.48); ctx.lineTo(x+s*0.15, y-s*0.23); ctx.lineTo(x+s*0.36, y-s*0.27); ctx.closePath(); ctx.fill();
  // Eyes
  const ey = y - s*0.08;
  if (expr === 'happy') {
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x-s*0.12, ey, s*0.06, Math.PI, 0); ctx.stroke();
    ctx.beginPath(); ctx.arc(x+s*0.12, ey, s*0.06, Math.PI, 0); ctx.stroke();
  } else {
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(x-s*0.12, ey, s*0.05, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+s*0.12, ey, s*0.05, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(x-s*0.1, ey-s*0.02, s*0.02, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+s*0.1, ey-s*0.02, s*0.02, 0, Math.PI*2); ctx.fill();
  }
  // Nose + mouth
  ctx.fillStyle = '#FFB6C1';
  ctx.beginPath(); ctx.arc(x, y+s*0.03, s*0.03, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
  if (expr === 'happy') {
    ctx.beginPath(); ctx.arc(x, y+s*0.09, s*0.05, 0, Math.PI); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(x-s*0.04, y+s*0.08); ctx.quadraticCurveTo(x, y+s*0.12, x+s*0.04, y+s*0.08); ctx.stroke();
  }
  // Whiskers
  ctx.strokeStyle = '#D4A574'; ctx.lineWidth = 1;
  for (let side = -1; side <= 1; side += 2) {
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath(); ctx.moveTo(x+side*s*0.12, y+s*0.03+i*s*0.04);
      ctx.lineTo(x+side*s*0.38, y+i*s*0.06); ctx.stroke();
    }
  }
  ctx.restore();
}

// ---- Drawing helpers ----
function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r); ctx.lineTo(x+w, y+h-r);
  ctx.arcTo(x+w, y+h, x+w-r, y+h, r); ctx.lineTo(x+r, y+h);
  ctx.arcTo(x, y+h, x, y+h-r, r); ctx.lineTo(x, y+r);
  ctx.arcTo(x, y, x+r, y, r); ctx.closePath();
}

function isInRect(px, py, x, y, w, h) {
  return px >= x && px <= x + w && py >= y && py <= y + h;
}

    drawRoundRect(cx, cy, 6, cardH, 3); ctx.fill();

    // Name
    ctx.textAlign = 'left';
    ctx.fillStyle = '#FFF';
    ctx.font = `700 ${Math.max(16, Math.min(26, cardH*0.34))}px Fredoka,sans-serif`;
    ctx.fillText(s.name, cx + 22, cy + cardH*0.36);

    // Difficulty + BPM
    ctx.fillStyle = s.color;
    ctx.font = `600 ${Math.max(13, Math.min(18, cardH*0.24))}px Fredoka,sans-serif`;
    ctx.fillText(`${s.difficulty}  ${s.bpm} BPM`, cx + 22, cy + cardH*0.68);

    // Stars (filled = gold, empty = dim)
    ctx.textAlign = 'right';
    const starSize = Math.max(13, Math.min(16, cardH*0.2));
    let starStr = '';
    for (let j = 0; j < 10; j++) starStr += j < s.stars ? '★' : '·';
    ctx.fillStyle = '#FFD700';
    ctx.font = `${starSize}px Fredoka,sans-serif`;
    // Draw filled stars
    let filled = '';
    for (let j = 0; j < s.stars; j++) filled += '★';
    ctx.fillText(filled, cx + cardW - 16 - (10 - s.stars) * starSize * 0.6, cy + cardH/2);
    // Draw empty dots dimmer
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    let empty = '';
    for (let j = s.stars; j < 10; j++) empty += '★';
    ctx.fillText(empty, cx + cardW - 16, cy + cardH/2);

    ctx.textAlign = 'center';
    cards.push({ x: cx, y: cy, w: cardW, h: cardH, idx: i });
  }

  // Preview info
  const s = songs[selectedSong];
  const previewY = startY + (cardH + gap) * 4 + 20;

  // Play button
  const bw = Math.min(280, W*0.6), bh = 70;
  const bx = W/2 - bw/2, by = Math.min(previewY + 30, H*0.75);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  drawRoundRect(bx+2, by+4, bw, bh, 16); ctx.fill();
  ctx.fillStyle = s.color;
  drawRoundRect(bx, by, bw, bh, 16); ctx.fill();
  ctx.fillStyle = '#FFF';
  ctx.font = `700 ${Math.min(30, W*0.05)}px Fredoka,sans-serif`;
  ctx.fillText('スタート！', W/2, by + bh/2);

  // Instructions
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = `400 ${fs(16, 0.028, 12)}px Fredoka,sans-serif`;
  ctx.fillText('赤（肉球）= 左タップ    青（ひっかき）= 右タップ', W/2, H*0.92);
  ctx.fillText('← Back: Escape', W/2, H*0.96);

  // Rin-chan
  drawRinChan(W*0.88, H*0.06, Math.min(W,H)*0.06, 'normal');

  return { cards, playBtn: { x: bx, y: by, w: bw, h: bh } };
}

// ---- GAMEPLAY ----
function initGame() {
  if (pendingTimeout) { clearTimeout(pendingTimeout); pendingTimeout = null; }
  stopBGM();
  const s = songs[selectedSong];
  const map = generateBeatMap(selectedSong);
  game = {
    notes: map.map(n => ({ ...n, hit: false, missed: false, judgeResult: '' })),
    elapsed: 0,
    score: 0,
    combo: 0,
    maxCombo: 0,
    perfect: 0,
    good: 0,
    miss: 0,
    totalNotes: map.length,
    phase: 'countdown',
    countdownStart: performance.now(),
    songDuration: 40,
    drumPulseL: 0,
    drumPulseR: 0,
    shakeX: 0,
    shakeY: 0,
    lastJudge: '',
    judgeTimer: 0,
    bpm: s.bpm,
    screenFlash: 0, // white flash on perfect
    bgPulse: 0, // background pulse on beat
    beatPulse: 0, // metronome pulse for visual rhythm cue
    lastBeatTime: 0, // track beat timing
    comboAnnounce: '', // "10 COMBO!" etc
    comboAnnounceTimer: 0,
    fever: false, // fever mode at 50+ combo
  };
  effects = [];
}

function startPlaying() {
  game.phase = 'playing';
  game.elapsed = 0;
  startBGM(selectedSong, game.bpm);
}

function updateGame(dt) {
  const g = game;

  if (g.phase === 'countdown') {
    const el = (performance.now() - g.countdownStart) / 1000;
    // Audible count-in beats synced to BPM
    const beatInterval = 60 / g.bpm;
    const beatNum = Math.floor(el / beatInterval);
    if (beatNum > g.lastBeatTime) {
      g.lastBeatTime = beatNum;
      g.beatPulse = 1;
      playTone(800, 0.05, 'sine', 0.15); // tick
      if (el >= 3.0) playTone(1200, 0.05, 'sine', 0.2); // higher tick for GO
    }
    g.beatPulse = Math.max(0, g.beatPulse - dt * 6);
    if (el >= 3.5) startPlaying();
    return;
  }

  if (g.phase === 'ending') return;
  if (g.phase !== 'playing') return;

  g.elapsed += dt;
  g.drumPulseL = Math.max(0, g.drumPulseL - dt * 8);
  g.drumPulseR = Math.max(0, g.drumPulseR - dt * 8);
  g.shakeX *= 0.85;
  g.shakeY *= 0.85;
  g.judgeTimer = Math.max(0, g.judgeTimer - dt);
  g.screenFlash = Math.max(0, g.screenFlash - dt * 5);
  g.bgPulse = Math.max(0, g.bgPulse - dt * 4);
  g.comboAnnounceTimer = Math.max(0, g.comboAnnounceTimer - dt);
  g.fever = g.combo >= 50;

  // Audible + visual metronome on every beat
  const beatInterval = 60 / g.bpm;
  const currentBeat = Math.floor(g.elapsed / beatInterval);
  if (currentBeat > g.lastBeatTime) {
    g.lastBeatTime = currentBeat;
    g.beatPulse = 1;

  }
  g.beatPulse = Math.max(0, g.beatPulse - dt * 5);

  // Tick BGM in sync with game elapsed
  tickBGM(g.elapsed);

  // Check for missed notes (time-domain, consistent with hit detection)
  for (const n of g.notes) {
    if (n.hit || n.missed) continue;
    if (g.elapsed - n.time > GOOD_WINDOW) {
      n.missed = true;
      g.miss++;
      g.combo = 0;
      g.lastJudge = 'Miss';
      g.judgeTimer = 0.5;
      g.shakeX = (Math.random() - 0.5) * 12;
      playMiss();
      addEffect(W * JUDGE_X, H * 0.38 - 50, 'MISS', '#FF4444', Math.max(20, Math.min(28, W*0.04)));
    }
  }

  // Song end
  if (g.elapsed >= g.songDuration + 2) {
    g.phase = 'ending';
    stopBGM();
    playFanfare();
    pendingTimeout = setTimeout(() => {
      if (state === 'playing') state = 'result';
      pendingTimeout = null;
    }, 1500);
  }
}

function hitNote(type) {
  // type: 'don' or 'ka'
  const g = game;
  if (g.phase !== 'playing') return;

  // Drum sound + pulse is handled by processTap (for countdown support too)
  if (type === 'don') g.drumPulseL = 1;
  else g.drumPulseR = 1;

  const judgeX = JUDGE_X;
  let bestNote = null, bestDist = Infinity;

  for (const n of g.notes) {
    if (n.hit || n.missed) continue;
    const timeDiff = Math.abs(n.time - g.elapsed);
    if (timeDiff < GOOD_WINDOW && n.type === type && timeDiff < bestDist) {
      bestDist = timeDiff;
      bestNote = n;
    }
  }

  if (!bestNote) return; // No matching note nearby, just drum sound (wrong type = ignore)

  bestNote.hit = true;
  const jx = W * judgeX;
  const jy = H * 0.38;

  if (bestDist < PERFECT_WINDOW) {
    g.perfect++;
    const bonus = Math.round(100 * (1 + Math.floor(g.combo / 10) * 0.1));
    g.combo++;
    g.score += bonus;
    g.lastJudge = 'Perfect';
    g.judgeTimer = 0.5;
    g.screenFlash = 0.4;
    g.bgPulse = 1;
    g.shakeY = -3;
    addEffect(jx, jy - 50, 'PERFECT', '#FFD700', Math.min(36, W*0.055));
    addBurst(jx, jy, '#FFD700', 16);
    addBurst(jx, jy, '#FF6B6B', 8);
    // Score popup
    addEffect(jx + 60, jy - 30, `+${bonus}`, '#FFA', Math.min(20, W*0.03));
    playPerfect();
  } else {
    g.good++;
    const bonus = Math.round(50 * (1 + Math.floor(g.combo / 10) * 0.1));
    g.combo++;
    g.score += bonus;
    g.lastJudge = 'Good';
    g.judgeTimer = 0.5;
    g.bgPulse = 0.5;
    addEffect(jx, jy - 50, 'GOOD', '#FFF', Math.min(30, W*0.045));
    addBurst(jx, jy, '#FFF', 8);
    addEffect(jx + 60, jy - 30, `+${bonus}`, '#DDD', Math.min(18, W*0.028));
    playGood();
  }

  if (g.combo > g.maxCombo) g.maxCombo = g.combo;

  // Combo milestone announcements
  if ([10, 25, 50, 75, 100].includes(g.combo)) {
    g.comboAnnounce = g.combo >= 100 ? 'すごすぎ！！' : g.combo >= 50 ? 'フィーバー！！' : `${g.combo} COMBO!`;
    g.comboAnnounceTimer = 1.5;
    playComboMilestone(g.combo);
    addBurst(W/2, H*0.2, g.combo >= 50 ? '#FFD700' : '#FF6B6B', 20);
  }
}

function drawGame(dt) {
  const g = game;
  const s = songs[selectedSong];

  // BG with pulse effect
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  const bgBright = g.fever ? 0.08 : 0;
  grad.addColorStop(0, `rgb(${26 + bgBright*60},${26 + bgBright*30},${46 + bgBright*20})`);
  grad.addColorStop(1, `rgb(${22 + bgBright*40},${33 + bgBright*40},${62 + bgBright*30})`);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  // Background beat pulse (radial glow from center)
  if (g.bgPulse > 0) {
    const pulseGrad = ctx.createRadialGradient(W*JUDGE_X, H*0.38, 0, W*JUDGE_X, H*0.38, W*0.6);
    const c = g.fever ? `255,200,50` : s.color.replace('#','').match(/.{2}/g).map(h=>parseInt(h,16)).join(',');
    pulseGrad.addColorStop(0, `rgba(${c},${g.bgPulse * 0.15})`);
    pulseGrad.addColorStop(1, `rgba(${c},0)`);
    ctx.fillStyle = pulseGrad;
    ctx.fillRect(0, 0, W, H);
  }

  // Screen flash on perfect
  if (g.screenFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${g.screenFlash * 0.15})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Fever border glow
  if (g.fever) {
    const t = performance.now() / 200;
    const feverAlpha = 0.08 + Math.sin(t) * 0.04;
    ctx.strokeStyle = `rgba(255,200,50,${feverAlpha})`;
    ctx.lineWidth = 6;
    ctx.strokeRect(3, 3, W-6, H-6);
  }

  ctx.save();
  ctx.translate(g.shakeX, g.shakeY || 0);

  // ---- Note highway ----
  const laneY = H * 0.32;
  const laneH = H * 0.14;
  const judgeX = W * JUDGE_X;

  // Lane background
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fillRect(0, laneY, W, laneH);

  // Lane border lines
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, laneY); ctx.lineTo(W, laneY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, laneY + laneH); ctx.lineTo(W, laneY + laneH); ctx.stroke();

  // Beat lines (vertical guides)
  if (g.phase === 'playing') {
    const beatInterval = 60 / g.bpm;
    const firstBeat = Math.ceil(g.elapsed / beatInterval) * beatInterval;
    for (let bt = firstBeat; bt < g.elapsed + 3; bt += beatInterval) {
      const x = judgeX + (bt - g.elapsed) * NOTE_SPEED * W;
      if (x > judgeX && x < W) {
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.beginPath(); ctx.moveTo(x, laneY); ctx.lineTo(x, laneY + laneH); ctx.stroke();
      }
    }
  }

  // Judgment line
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(judgeX, laneY - 5); ctx.lineTo(judgeX, laneY + laneH + 5); ctx.stroke();

  // Judgment circle (paw target)
  const drumR = laneH * 0.42;
  const drumCy = laneY + laneH / 2;

  // Beat pulse ring — always pulsing to rhythm (リズム天国style)
  const bp = g.beatPulse || 0;
  if (bp > 0) {
    const ringR = drumR * (1.2 + bp * 0.8);
    ctx.strokeStyle = `rgba(255,255,255,${bp * 0.3})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(judgeX, drumCy, ringR, 0, Math.PI*2); ctx.stroke();
  }

  // Outer glow on hit
  const pulseMax = Math.max(g.drumPulseL, g.drumPulseR);
  if (pulseMax > 0) {
    const glowColor = g.drumPulseL > g.drumPulseR ? '255,100,80' : '80,180,255';
    const glowGrad = ctx.createRadialGradient(judgeX, drumCy, drumR, judgeX, drumCy, drumR * 2.5);
    glowGrad.addColorStop(0, `rgba(${glowColor},${pulseMax * 0.6})`);
    glowGrad.addColorStop(1, `rgba(${glowColor},0)`);
    ctx.fillStyle = glowGrad;
    ctx.fillRect(judgeX - drumR*3, drumCy - drumR*3, drumR*6, drumR*6);
  }

  // Target ring — breathes with beat
  const breathe = 1 + bp * 0.08;
  ctx.fillStyle = `rgba(255,255,255,${0.08 + pulseMax * 0.1 + bp * 0.05})`;
  ctx.beginPath(); ctx.arc(judgeX, drumCy, drumR * breathe, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = `rgba(255,255,255,${0.4 + pulseMax * 0.4 + bp * 0.2})`;
  ctx.lineWidth = 3 + bp * 2;
  ctx.beginPath(); ctx.arc(judgeX, drumCy, drumR * breathe, 0, Math.PI*2); ctx.stroke();

  // Paw print inside — pulses with beat
  ctx.globalAlpha = 0.15 + pulseMax * 0.3 + bp * 0.15;
  drawPawPrint(judgeX, drumCy, drumR * 0.6 * breathe, '#FFF');
  ctx.globalAlpha = 1;

  // ---- Notes ----
  const noteR = Math.min(W, H) * NOTE_R_FRAC;
  const noteCy = laneY + laneH / 2;

  if (g.phase === 'countdown') {
    const el = (performance.now() - g.countdownStart) / 1000;
    const num = 3 - Math.floor(el);
    // Pulsing beat ring
    const pulseR = 60 + g.beatPulse * 30;
    ctx.strokeStyle = `rgba(255,255,255,${0.2 + g.beatPulse * 0.5})`;
    ctx.lineWidth = 3 + g.beatPulse * 4;
    ctx.beginPath(); ctx.arc(W/2, H/2, pulseR, 0, Math.PI*2); ctx.stroke();
    // Number with scale bounce
    const numScale = 1 + g.beatPulse * 0.2;
    ctx.save();
    ctx.translate(W/2, H/2);
    ctx.scale(numScale, numScale);
    ctx.fillStyle = '#FFF';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `700 ${Math.min(100, W*0.15)}px Fredoka,sans-serif`;
    ctx.fillText(num > 0 ? num : 'GO!', 0, 0);
    ctx.restore();
    ctx.restore();
    return;
  }

  if (g.phase === 'ending') {
    ctx.restore();
    ctx.fillStyle = '#FFF';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `700 ${Math.min(56, W*0.09)}px Fredoka,sans-serif`;
    ctx.fillText('クリア！', W/2, H/2);
    drawRinChan(W/2, H*0.65, Math.min(W,H)*0.12, 'happy');
    return;
  }

  // Draw notes — glow brighter as they approach (リズム天国 approach cue)
  for (const n of g.notes) {
    if (n.hit || n.missed) continue;
    const noteX = judgeX + (n.time - g.elapsed) * NOTE_SPEED * W;
    if (noteX < -noteR * 2 || noteX > W + noteR * 2) continue;

    const isDon = n.type === 'don';
    // Proximity factor: 0 (far) → 1 (at judgment line)
    const dist = (noteX - judgeX) / W;
    const proximity = Math.max(0, 1 - dist * 3);
    const noteScale = 1 + proximity * 0.15; // grow slightly on approach

    // Approach glow
    if (proximity > 0.5) {
      const glowA = (proximity - 0.5) * 0.4;
      const glowC = isDon ? '231,76,60' : '52,152,219';
      ctx.fillStyle = `rgba(${glowC},${glowA})`;
      ctx.beginPath(); ctx.arc(noteX, noteCy, noteR * noteScale * 1.5, 0, Math.PI*2); ctx.fill();
    }

    // Note shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.arc(noteX + 1, noteCy + 1, noteR * noteScale, 0, Math.PI*2); ctx.fill();

    // Note body — brighter on approach
    const baseAlpha = 0.2 + proximity * 0.3;
    ctx.fillStyle = isDon ? `rgba(231,76,60,${baseAlpha})` : `rgba(52,152,219,${baseAlpha})`;
    ctx.beginPath(); ctx.arc(noteX, noteCy, noteR * noteScale, 0, Math.PI*2); ctx.fill();

    // Border — thicker on approach
    const baseColor = isDon ? '#E74C3C' : '#3498DB';
    ctx.strokeStyle = baseColor;
    ctx.lineWidth = 2.5 + proximity * 2;
    ctx.beginPath(); ctx.arc(noteX, noteCy, noteR * noteScale, 0, Math.PI*2); ctx.stroke();

    // Paw/scratch icon — brighter on approach
    const iconAlpha = 0.7 + proximity * 0.3;
    ctx.globalAlpha = iconAlpha;
    if (isDon) {
      drawPawPrint(noteX, noteCy, noteR * noteScale * 0.75, '#FF6B6B');
    } else {
      drawScratchMark(noteX, noteCy, noteR * noteScale * 0.85, '#5DADE2');
    }
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  // ---- HUD ----
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';

  // Score
  ctx.fillStyle = '#FFF';
  ctx.font = `700 ${fs(28, 0.045, 18)}px Fredoka,sans-serif`;
  ctx.fillText(`${Math.floor(g.score)}`, 16, H * 0.06);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = `400 ${fs(14, 0.023, 11)}px Fredoka,sans-serif`;
  ctx.fillText('スコア', 16, H * 0.025);

  // Combo
  ctx.textAlign = 'center';
  if (g.combo >= 2) {
    const comboScale = 1 + Math.max(g.drumPulseL, g.drumPulseR) * 0.3;
    ctx.save();
    ctx.translate(W/2, H * 0.2);
    ctx.scale(comboScale, comboScale);
    // Combo glow behind number
    if (g.combo >= 20) {
      ctx.fillStyle = g.combo >= 50 ? 'rgba(255,215,0,0.15)' : 'rgba(255,107,107,0.1)';
      ctx.beginPath(); ctx.arc(0, 0, fs(48, 0.08, 24) * 0.8, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = g.combo >= 50 ? '#FFD700' : g.combo >= 20 ? '#FF6B6B' : '#FFF';
    ctx.font = `700 ${fs(52, 0.085, 28)}px Fredoka,sans-serif`;
    ctx.fillText(g.combo, 0, 0);
    ctx.fillStyle = g.combo >= 50 ? 'rgba(255,215,0,0.7)' : 'rgba(255,255,255,0.6)';
    ctx.font = `600 ${fs(18, 0.03, 12)}px Fredoka,sans-serif`;
    ctx.fillText('コンボ', 0, fs(30, 0.05, 18));
    ctx.restore();
  }

  // Song info
  ctx.textAlign = 'right';
  ctx.fillStyle = s.color;
  ctx.font = `600 ${fs(18, 0.03, 12)}px Fredoka,sans-serif`;
  ctx.fillText(s.name, W - 16, H * 0.03);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = `400 ${fs(14, 0.023, 11)}px Fredoka,sans-serif`;
  ctx.fillText(`${s.difficulty}  ${s.bpm}BPM`, W - 16, H * 0.06);

  // Progress bar
  const barW = W * 0.5;
  const barH = 8;
  const barX = W * 0.25;
  const barY = H * 0.09;
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  drawRoundRect(barX, barY, barW, barH, 3); ctx.fill();
  ctx.fillStyle = s.color;
  drawRoundRect(barX, barY, barW * Math.min(1, g.elapsed / g.songDuration), barH, 3); ctx.fill();

  // ---- Bottom: Tap zones ----
  const tapY = H * 0.55;
  const tapH = H * 0.45;
  const halfW = W / 2;

  // Don zone (left)
  ctx.fillStyle = `rgba(231,76,60,${0.08 + g.drumPulseL * 0.15})`;
  ctx.fillRect(0, tapY, halfW - 1, tapH);
  // Ka zone (right)
  ctx.fillStyle = `rgba(52,152,219,${0.08 + g.drumPulseR * 0.15})`;
  ctx.fillRect(halfW + 1, tapY, halfW - 1, tapH);

  // Divider
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(halfW - 1, tapY, 2, tapH);

  // Zone labels
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const labelY = tapY + tapH * 0.35;
  const labelSize = Math.min(48, W * 0.08, tapH * 0.25);
  const subSize = fs(22, 0.035, 14);

  // Paw icon + label on left (high contrast)
  drawPawPrint(halfW * 0.5, labelY - labelSize * 0.2, labelSize * 0.7, `rgba(231,76,60,${0.5 + g.drumPulseL * 0.5})`);
  ctx.fillStyle = `rgba(255,180,160,${0.55 + g.drumPulseL * 0.45})`;
  ctx.font = `600 ${subSize}px Fredoka,sans-serif`;
  ctx.fillText('肉球 (D/F)', halfW * 0.5, labelY + labelSize * 0.8);

  // Scratch icon + label on right (high contrast)
  drawScratchMark(halfW * 1.5, labelY - labelSize * 0.1, labelSize * 0.7, `rgba(52,152,219,${0.5 + g.drumPulseR * 0.5})`);
  ctx.fillStyle = `rgba(160,210,255,${0.55 + g.drumPulseR * 0.45})`;
  ctx.font = `600 ${subSize}px Fredoka,sans-serif`;
  ctx.fillText('ひっかき (J/K)', halfW * 1.5, labelY + labelSize * 0.8);

  // Rin-chan in corner
  const rinExpr = g.combo >= 10 ? 'happy' : 'normal';
  drawRinChan(W - Math.min(W,H)*0.06 - 10, H * 0.5 - 10, Math.min(W,H)*0.06, rinExpr);

  // Accuracy indicator (compact)
  ctx.textAlign = 'left';
  const hitCount = g.perfect + g.good;
  const totalSoFar = hitCount + g.miss;
  if (totalSoFar > 0) {
    const accPct = Math.round(hitCount / totalSoFar * 100);
    ctx.fillStyle = accPct >= 90 ? '#FFD700' : accPct >= 70 ? '#FFF' : '#FF6B6B';
    ctx.font = `600 ${fs(16, 0.026, 12)}px Fredoka,sans-serif`;
    ctx.fillText(`${accPct}%`, 16, H * 0.12);
  }

  // Combo milestone announcement (big centered text)
  if (g.comboAnnounceTimer > 0) {
    const aScale = Math.min(1, (1.5 - g.comboAnnounceTimer) * 4); // ease in
    const aAlpha = Math.min(1, g.comboAnnounceTimer);
    ctx.save();
    ctx.globalAlpha = aAlpha;
    ctx.translate(W/2, H * 0.45);
    ctx.scale(aScale, aScale);
    ctx.fillStyle = g.combo >= 50 ? '#FFD700' : '#FF6B6B';
    ctx.font = `700 ${fs(56, 0.09, 28)}px Fredoka,sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(g.comboAnnounce, 0, 0);
    ctx.restore();
  }

  // Draw effects on top
  drawEffects();
}

// ---- RESULT ----
function drawResult() {
  const g = game;
  const s = songs[selectedSong];

  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a1a2e'); grad.addColorStop(1, '#16213e');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // Song name
  ctx.fillStyle = s.color;
  ctx.font = `700 ${Math.min(32, W*0.05)}px Fredoka,sans-serif`;
  ctx.fillText(s.name, W/2, H*0.06);

  // Rank
  // Hit rate: Perfect = 1.0, Good = 0.75, Miss = 0
  const pct = g.totalNotes > 0 ? (g.perfect + g.good * 0.75) / g.totalNotes : 0;
  let rank = 'C', rankColor = '#888';
  if (pct >= 0.92) { rank = 'S'; rankColor = '#FFD700'; }
  else if (pct >= 0.8) { rank = 'A'; rankColor = '#FF6B6B'; }
  else if (pct >= 0.6) { rank = 'B'; rankColor = '#5DADE2'; }

  ctx.fillStyle = rankColor;
  ctx.font = `700 ${Math.min(100, W*0.16)}px Fredoka,sans-serif`;
  ctx.fillText(rank, W/2, H*0.2);

  // Rin-chan
  const rinExpr = rank === 'S' || rank === 'A' ? 'happy' : 'normal';
  drawRinChan(W/2, H*0.38, Math.min(W,H)*0.12, rinExpr);

  // Stats
  const statY = H * 0.52;
  const lineH = Math.min(32, H * 0.045);
  ctx.font = `600 ${Math.min(24, W*0.04)}px Fredoka,sans-serif`;

  ctx.fillStyle = '#FFF';
  ctx.fillText(`スコア: ${Math.floor(g.score)}`, W/2, statY);
  ctx.fillStyle = '#FFD700';
  ctx.fillText(`パーフェクト: ${g.perfect}`, W/2, statY + lineH);
  ctx.fillStyle = '#FFF';
  ctx.fillText(`グッド: ${g.good}`, W/2, statY + lineH * 2);
  ctx.fillStyle = '#888';
  ctx.fillText(`ミス: ${g.miss}`, W/2, statY + lineH * 3);
  ctx.fillStyle = '#FF6B6B';
  ctx.fillText(`最大コンボ: ${g.maxCombo}`, W/2, statY + lineH * 4);

  const msgY = statY + lineH * 5.5;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = `400 ${Math.min(20, W*0.035)}px Fredoka,sans-serif`;
  if (rank === 'S') ctx.fillText('にゃんと完璧！！すごい！！', W/2, msgY);
  else if (rank === 'A') ctx.fillText('すばらしい！', W/2, msgY);
  else if (rank === 'B') ctx.fillText('いいかんじ！もういちど！', W/2, msgY);
  else ctx.fillText('がんばって！できるよ！', W/2, msgY);

  // Buttons
  const bw = Math.min(200, W*0.38), bh = 60, gap = 16;
  const totalW = bw*2 + gap;
  const bx1 = W/2 - totalW/2, bx2 = bx1 + bw + gap;
  const by = H * 0.82;

  ctx.fillStyle = s.color;
  drawRoundRect(bx1, by, bw, bh, 14); ctx.fill();
  ctx.fillStyle = '#FFF';
  ctx.font = `700 ${Math.min(24, W*0.04)}px Fredoka,sans-serif`;
  ctx.fillText('もういちど', bx1 + bw/2, by + bh/2);

  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  drawRoundRect(bx2, by, bw, bh, 14); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2;
  drawRoundRect(bx2, by, bw, bh, 14); ctx.stroke();
  ctx.fillStyle = '#FFF';
  ctx.fillText('きょくえらび', bx2 + bw/2, by + bh/2);

  return {
    retryBtn: { x: bx1, y: by, w: bw, h: bh },
    menuBtn: { x: bx2, y: by, w: bw, h: bh },
  };
}

// ---- Main Loop ----
let lastTime = performance.now();
let uiData = {};

function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;
  ctx.clearRect(0, 0, W, H);

  switch (state) {
    case 'title': uiData = drawTitle(); break;
    case 'select': uiData = drawSelect(); break;
    case 'playing':
      updateGame(dt);
      drawGame(dt);
      updateEffects(dt);
      break;
    case 'result':
      uiData = drawResult();
      updateEffects(dt);
      drawEffects();
      break;
  }

  requestAnimationFrame(loop);
}

// ---- Input ----
let lastTouchTime = 0;

function processTap(x, y) {
  switch (state) {
    case 'title':
      if (uiData.btn && isInRect(x, y, uiData.btn.x, uiData.btn.y, uiData.btn.w, uiData.btn.h)) {
        playSelect(); state = 'select';
      }
      break;

    case 'select':
      if (uiData.cards) {
        for (const c of uiData.cards) {
          if (isInRect(x, y, c.x, c.y, c.w, c.h)) {
            playSelect(); selectedSong = c.idx; break;
          }
        }
      }
      if (uiData.playBtn && isInRect(x, y, uiData.playBtn.x, uiData.playBtn.y, uiData.playBtn.w, uiData.playBtn.h)) {
        playSelect(); state = 'playing'; initGame();
      }
      break;

    case 'playing': {
      // Allow drum sounds during countdown too
      const isDon = x < W / 2;
      if (isDon) playDon(); else playKa();
      if (game.phase === 'playing') {
        hitNote(isDon ? 'don' : 'ka');
      } else {
        // Visual feedback during countdown
        if (isDon) game.drumPulseL = 1; else game.drumPulseR = 1;
      }
      break;
    }

    case 'result':
      if (uiData.retryBtn && isInRect(x, y, uiData.retryBtn.x, uiData.retryBtn.y, uiData.retryBtn.w, uiData.retryBtn.h)) {
        playSelect(); state = 'playing'; initGame();
      }
      if (uiData.menuBtn && isInRect(x, y, uiData.menuBtn.x, uiData.menuBtn.y, uiData.menuBtn.w, uiData.menuBtn.h)) {
        playSelect(); stopBGM(); state = 'select';
      }
      break;
  }
}

function handleTap(e) {
  e.preventDefault();
  ensureAudio();
  if (e.type === 'touchstart') {
    lastTouchTime = Date.now();
    // Handle all simultaneous touches (multi-touch for don+ka)
    for (const touch of e.changedTouches) {
      processTap(touch.clientX, touch.clientY);
    }
  } else {
    if (Date.now() - lastTouchTime < 500) return;
    processTap(e.clientX, e.clientY);
  }
}

canvas.addEventListener('mousedown', handleTap);
canvas.addEventListener('touchstart', handleTap, { passive: false });
document.addEventListener('dblclick', e => e.preventDefault());

// Keyboard
document.addEventListener('keydown', e => {
  if (e.repeat) return; // Prevent key-repeat auto-fire
  ensureAudio();

  // Don keys: D, F
  if ((e.code === 'KeyD' || e.code === 'KeyF') && state === 'playing') {
    e.preventDefault();
    playDon(); game.drumPulseL = 1;
    if (game.phase === 'playing') hitNote('don');
    return;
  }
  // Ka keys: J, K
  if ((e.code === 'KeyJ' || e.code === 'KeyK') && state === 'playing') {
    e.preventDefault();
    playKa(); game.drumPulseR = 1;
    if (game.phase === 'playing') hitNote('ka');
    return;
  }

  // Navigation
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    if (state === 'title') { playSelect(); state = 'select'; }
    else if (state === 'select') { playSelect(); state = 'playing'; initGame(); }
    else if (state === 'result') { playSelect(); state = 'playing'; initGame(); }
  }
  if (e.code === 'Escape') {
    if (state === 'select') { playSelect(); state = 'title'; }
    else if (state === 'result') { playSelect(); stopBGM(); if (pendingTimeout) { clearTimeout(pendingTimeout); pendingTimeout = null; } state = 'select'; }
    else if (state === 'playing') { stopBGM(); if (pendingTimeout) { clearTimeout(pendingTimeout); pendingTimeout = null; } state = 'select'; }
  }
  if (state === 'select') {
    if (e.code === 'ArrowDown') { selectedSong = Math.min(songs.length - 1, selectedSong + 1); playSelect(); }
    if (e.code === 'ArrowUp') { selectedSong = Math.max(0, selectedSong - 1); playSelect(); }
  }
});

// Start
requestAnimationFrame(loop);
</script>
</body>
</html>
